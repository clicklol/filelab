name: Deploy FileLab

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Description de la mise à jour'
        required: false
        default: 'Mise à jour FileLab'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CLAUDE_DEPLOY_TOKEN }}

      - name: Download latest build
        run: |
          curl -L "${{ github.event.inputs.file_url }}" -o index.html

      - name: Commit and push
        run: |
          git config user.name "FileLab Bot"
          git config user.email "bot@filelab"
          git add index.html
          git commit -m "${{ github.event.inputs.message }}" || echo "No changes"
          git push
